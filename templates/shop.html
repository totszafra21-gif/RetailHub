{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h3 class="fw-bold mb-3">🛍️ Shop</h3>

    <!-- CATEGORY ICONS -->
    <div class="d-flex gap-3 flex-wrap mb-4">
        <a href="/shop" class="text-decoration-none text-center">
            <div class="p-3 rounded-3 bg-light border" style="width:80px;">
                <div style="font-size:28px;">🛍️</div>
                <small class="fw-bold">All</small>
            </div>
        </a>
        <a href="/shop?category=laptop" class="text-decoration-none text-center">
            <div class="p-3 rounded-3 bg-light border" style="width:80px;">
                <div style="font-size:28px;">💻</div>
                <small class="fw-bold">Laptop</small>
            </div>
        </a>
        <a href="/shop?category=phone" class="text-decoration-none text-center">
            <div class="p-3 rounded-3 bg-light border" style="width:80px;">
                <div style="font-size:28px;">📱</div>
                <small class="fw-bold">Phone</small>
            </div>
        </a>
        <a href="/shop?category=shoes" class="text-decoration-none text-center">
            <div class="p-3 rounded-3 bg-light border" style="width:80px;">
                <div style="font-size:28px;">👟</div>
                <small class="fw-bold">Shoes</small>
            </div>
        </a>
        <a href="/shop?category=watch" class="text-decoration-none text-center">
            <div class="p-3 rounded-3 bg-light border" style="width:80px;">
                <div style="font-size:28px;">⌚</div>
                <small class="fw-bold">Watch</small>
            </div>
        </a>
        <a href="/shop?category=accessories" class="text-decoration-none text-center">
            <div class="p-3 rounded-3 bg-light border" style="width:90px;">
                <div style="font-size:28px;">🎧</div>
                <small class="fw-bold" style="font-size:11px;">Accessories</small>
            </div>
        </a>
    </div>

    <div class="row g-4">

        {% for p in products %}
        <div class="col-md-3">
            <div class="card h-100 border-0 shadow-sm" style="border-radius:15px; overflow:hidden;">

                <img src="{{ url_for('static', filename=p['image'] if p['image'] else 'images/default.jpg') }}"
                     class="card-img-top"
                     style="height:220px; object-fit:cover;">

                <div class="card-body text-center d-flex flex-column justify-content-between">
                    <div>
                        <h5 class="fw-bold mb-1">{{ p['name'] }}</h5>
                        <p class="text-danger fw-bold fs-5">₱{{ p['price'] }}</p>
                    </div>
                    <a href="{% if session.get('user') %}/add_to_cart/{{ p['id'] }}{% else %}/login{% endif %}" class="btn btn-dark w-100 mt-2" style="border-radius:10px;">
                        🛒 Add to Cart
                    </a>
                </div>

            </div>
        </div>
        {% else %}
        <div class="col-12 text-center">
            <p class="text-muted">No products available</p>
        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
