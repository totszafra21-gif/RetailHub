{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">

            {% if sent %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                ✅ Your message has been sent successfully!
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endif %}

            <div class="card shadow border-0" style="border-radius:15px;">
                <div class="card-body p-4">

                    <h3 class="fw-bold text-center mb-4">📬 Contact Us</h3>

                    <form method="POST">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted">Full Name</label>
                                <input name="name" class="form-control" placeholder="Full Name" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label text-muted">Email</label>
                                <input name="email" type="email" class="form-control" placeholder="Email" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-muted">Message</label>
                            <textarea name="message" class="form-control" rows="5" placeholder="Your Message" required></textarea>
                        </div>

                        <button class="btn btn-dark w-100 py-2 fw-bold">Send Message</button>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
